<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Photography | Sven Belz</title>
  <meta name="description" content="Travel Photography von Sven Belz — Orte, Atmosphäre und visuelle Geschichten aus unterschiedlichen Reisezielen.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="canonical" href="https://agentnebel.github.io/2026website/travel.html">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Sven Belz">
  <meta property="og:locale" content="de_DE">
  <meta property="og:title" content="Travel Photography | Sven Belz">
  <meta property="og:description" content="Travel Photography von Sven Belz — Orte, Atmosphäre und visuelle Geschichten aus unterschiedlichen Reisezielen.">
  <meta property="og:url" content="https://agentnebel.github.io/2026website/travel.html">
  <meta property="og:image" content="https://agentnebel.github.io/2026website/images/about-sven.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Travel Photography | Sven Belz">
  <meta name="twitter:description" content="Travel Photography von Sven Belz — Orte, Atmosphäre und visuelle Geschichten aus unterschiedlichen Reisezielen.">
  <meta name="twitter:image" content="https://agentnebel.github.io/2026website/images/about-sven.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Barlow', sans-serif; overflow-x: hidden; transition: background 0.4s, color 0.4s; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #444; }
    a { color: inherit; text-decoration: none; }
    button, a { -webkit-tap-highlight-color: transparent; }
    @media (max-width: 768px) {
      .nav-desktop     { display: none !important; }
      .nav-burger      { display: flex !important; }
      .nav-mobile-menu { display: block !important; }
      .intro { padding: 48px 24px 40px !important; }
      .destinations { padding: 0 24px 72px !important; }
      .row { display:block !important; }
      .tile { margin-bottom:16px !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<noscript>
  <div style="padding:60px 20px;text-align:center;font-family:sans-serif;max-width:600px;margin:0 auto;color:#666;background:#0a0a0a;min-height:100vh">
    <h1 style="color:#fff">Travel Photography</h1>
    <p>Bitte aktiviere JavaScript, um die Galerie zu sehen.</p>
    <p style="font-size:0.9em">Please enable JavaScript to view the gallery.</p>
  </div>
</noscript>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const getInitialTheme = () => {
  const saved = localStorage.getItem('sv_dark');
  if (saved !== null) return saved !== 'false';
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (prefersDark) return true;
  return new Date().getHours() >= 19 || new Date().getHours() < 7;
};

const THEMES = {
  dark: {
    bg: '#0a0a0a', bgNav: 'rgba(10,10,10,0.95)', bgCard: '#111',
    bgGallery: 'rgba(0,0,0,0.97)', galleryBorder: '#333',
    galleryText: '#fff', galleryMuted: '#666', galleryCounter: '#555',
    text: '#fff', textMuted: '#666', textSub: '#444', border: '#1c1c1c',
  },
  light: {
    bg: '#f5f3f0', bgNav: 'rgba(245,243,240,0.95)', bgCard: '#e8e5e0',
    bgGallery: 'rgba(245,243,240,0.98)', galleryBorder: '#ccc',
    galleryText: '#0a0a0a', galleryMuted: '#888', galleryCounter: '#aaa',
    text: '#0a0a0a', textMuted: '#777', textSub: '#aaa', border: '#ddd',
  },
};

// Platzhalter-Bilder von Unsplash mit echten URLs
const DESTINATIONS = [
  {
    label: 'Japan',
    rows: [
      [
        { src: 'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=1400&q=85', caption: 'Tokyo, 2024' },
        { src: 'https://images.unsplash.com/photo-1492571350019-22de08371fd3?w=1400&q=85', caption: 'Kyoto, Fushimi Inari' },
      ],
      [
        { src: 'https://images.unsplash.com/photo-1545569341-9eb8b30979d9?w=1400&q=85', caption: '' },
        { src: 'https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=1400&q=85', caption: '' },
      ]
    ]
  },
  {
    label: 'Portugal',
    rows: [
      [
        { src: 'https://images.unsplash.com/photo-1555881400-74d7acaacd8b?w=1400&q=85', caption: '' },
        { src: 'https://images.unsplash.com/photo-1591381454778-78448e4eddbc?w=1400&q=85', caption: '' },
      ]
    ]
  }
];

function Lightbox({ images, index, onClose, onPrev, onNext, onSelect, th, isMobile }) {
  useEffect(() => {
    const fn = e => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowLeft') onPrev();
      if (e.key === 'ArrowRight') onNext();
    };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, [onClose, onPrev, onNext]);

  const current = images[index];
  return (
    <div onClick={e => e.target === e.currentTarget && onClose()} style={{ position:'fixed', inset:0, background:th.bgGallery, zIndex:1000, display:'flex', flexDirection:'column', animation:'fadeIn 0.25s ease' }}>
      <div style={{ display:'flex', alignItems:isMobile ? 'flex-start' : 'center', justifyContent:'space-between', gap:isMobile ? 12 : 0, padding:isMobile ? '16px 18px' : '24px 40px', flexShrink:0, borderBottom:`1px solid ${th.galleryBorder}` }}>
        <div>
          <div style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:18, letterSpacing:'0.08em', textTransform:'uppercase', color:th.galleryText }}>{current.destination}</div>
          <div style={{ fontSize:13, color:th.galleryMuted, marginTop:2, letterSpacing:'0.05em' }}>{current.caption || ''}</div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:isMobile ? 12 : 32, flexShrink:0 }}>
          <span style={{ color:th.galleryCounter, fontSize:13, letterSpacing:'0.08em' }}>{index + 1} / {images.length}</span>
          <button onClick={onClose} style={{ background:'none', border:`1px solid ${th.galleryBorder}`, color:th.galleryText, width:40, height:40, cursor:'pointer' }}>×</button>
        </div>
      </div>
      <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', position:'relative', minHeight:0 }}>
        <button onClick={onPrev} style={{ position:'absolute', left:isMobile ? 4 : 24, background:'none', border:'none', color:th.galleryText, cursor:'pointer', padding:isMobile ? 8 : 16, opacity:0.5, fontSize:34 }}>‹</button>
        <div style={{ height:'100%', maxHeight:isMobile ? 'calc(100vh - 220px)' : 'calc(100vh - 180px)', display:'flex', alignItems:'center', justifyContent:'center', padding:isMobile ? '0 28px' : '0 80px' }}>
          <img src={current.src} alt={current.caption || `${current.destination} Bild ${index + 1}`} style={{ maxWidth:'100%', maxHeight:'100%', objectFit:'contain', filter:'grayscale(100%)' }} />
        </div>
        <button onClick={onNext} style={{ position:'absolute', right:isMobile ? 4 : 24, background:'none', border:'none', color:th.galleryText, cursor:'pointer', padding:isMobile ? 8 : 16, opacity:0.5, fontSize:34 }}>›</button>
      </div>
      <div style={{ flexShrink:0, padding:isMobile ? '12px 18px 18px' : '16px 40px 24px', display:'flex', gap:8, justifyContent:isMobile ? 'flex-start' : 'center', overflowX:'auto', borderTop:`1px solid ${th.galleryBorder}` }}>
        {images.map((img, i) => (
          <button key={i} onClick={() => onSelect(i)} style={{ width:60, height:40, flexShrink:0, cursor:'pointer', border: i===index ? `1px solid ${th.galleryText}` : '1px solid transparent', opacity: i===index ? 1 : 0.4, overflow:'hidden', background:'transparent', padding:0 }}>
            <img src={img.src} alt="" style={{ width:'100%', height:'100%', objectFit:'cover', filter:'grayscale(100%)' }} />
          </button>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [dark, setDark] = useState(getInitialTheme);
  const [menuOpen, setMenuOpen] = useState(false);
  const [isMobile, setIsMobile] = useState(() => window.innerWidth <= 768);
  const [lightboxIndex, setLightboxIndex] = useState(null);
  const th = dark ? THEMES.dark : THEMES.light;

  useEffect(() => {
    localStorage.setItem('sv_dark', dark);
    document.body.style.background = th.bg;
    document.body.style.color = th.text;
    const themeColor = document.querySelector('meta[name="theme-color"]');
    if (themeColor) themeColor.setAttribute('content', dark ? '#0a0a0a' : '#f5f3f0');
  }, [dark, th]);

  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth <= 768);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  useEffect(() => {
    if (localStorage.getItem('sv_dark') !== null || !window.matchMedia) return;
    const media = window.matchMedia('(prefers-color-scheme: dark)');
    const applyAutoTheme = e => setDark(e.matches);
    if (media.addEventListener) media.addEventListener('change', applyAutoTheme);
    else if (media.addListener) media.addListener(applyAutoTheme);
    return () => {
      if (media.removeEventListener) media.removeEventListener('change', applyAutoTheme);
      else if (media.removeListener) media.removeListener(applyAutoTheme);
    };
  }, []);

  const flatImages = DESTINATIONS.flatMap(destination => destination.rows.flatMap(row => row.map(image => ({ ...image, destination: destination.label }))));

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', background:th.bg, transition:'background 0.4s' }}>
      <style>{`
        @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
        @keyframes slideDown { from { opacity:0; transform:translateY(-6px) } to { opacity:1; transform:translateY(0) } }
      `}</style>

      <nav style={{ position:'sticky', top:0, zIndex:500, display:'flex', alignItems:'center', justifyContent:'space-between', padding:isMobile ? '0 18px' : '0 40px', height:64, background:th.bgNav, backdropFilter:'blur(12px)', borderBottom:`1px solid ${th.border}`, transition:'background 0.4s, border-color 0.4s' }}>
        <div className="nav-desktop" style={{ display:'flex', gap:0 }}>
          <a href="index.html" style={{ display:'inline-flex', alignItems:'center', color:th.textMuted, fontFamily:'Barlow Condensed', fontWeight:900, fontSize:15, letterSpacing:'0.12em', textTransform:'uppercase', padding:'0 18px', height:64, borderBottom:'2px solid transparent', transition:'color 0.2s, border-color 0.2s' }}>Start</a>
          <a href="street.html" style={{ display:'inline-flex', alignItems:'center', color:th.textMuted, fontFamily:'Barlow Condensed', fontWeight:900, fontSize:15, letterSpacing:'0.12em', textTransform:'uppercase', padding:'0 18px', height:64, borderBottom:'2px solid transparent', transition:'color 0.2s, border-color 0.2s' }}>Street</a>
          <a href="travel.html" style={{ display:'inline-flex', alignItems:'center', color:th.text, fontFamily:'Barlow Condensed', fontWeight:900, fontSize:15, letterSpacing:'0.12em', textTransform:'uppercase', padding:'0 18px', height:64, borderBottom:`2px solid ${th.text}`, transition:'color 0.2s, border-color 0.2s' }}>Travel</a>
          <a href="index.html#about" style={{ display:'inline-flex', alignItems:'center', color:th.textMuted, fontFamily:'Barlow Condensed', fontWeight:900, fontSize:15, letterSpacing:'0.12em', textTransform:'uppercase', padding:'0 18px', height:64, borderBottom:'2px solid transparent', transition:'color 0.2s, border-color 0.2s' }}>About</a>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <button onClick={() => setDark(d => !d)} title={dark ? 'Hellmodus' : 'Dunkelmodus'} aria-label={dark ? 'Zu Hellmodus wechseln' : 'Zu Dunkelmodus wechseln'} style={{ background:'transparent', border:'none', cursor:'pointer', width:40, height:40, display:'flex', alignItems:'center', justifyContent:'center', color:th.text }}>
            {dark ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke={th.text} strokeWidth="1.8"/><path d="M12 2.5V5.2M12 18.8V21.5M21.5 12H18.8M5.2 12H2.5M18.72 5.28L16.81 7.19M7.19 16.81L5.28 18.72M18.72 18.72L16.81 16.81M7.19 7.19L5.28 5.28" stroke={th.text} strokeWidth="1.8" strokeLinecap="round"/></svg> : <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20.2 14.1A8.5 8.5 0 1 1 9.9 3.8a7 7 0 1 0 10.3 10.3Z" stroke={th.text} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </button>
          <button onClick={() => setMenuOpen(m => !m)} className="nav-burger" aria-label={menuOpen ? 'Menü schließen' : 'Menü öffnen'} style={{ display:'none', background:'none', border:'none', cursor:'pointer', width:40, height:40, flexDirection:'column', alignItems:'center', justifyContent:'center', gap:5, padding:0 }}>
            {menuOpen ? <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><line x1="1" y1="1" x2="17" y2="17" stroke={th.text} strokeWidth="1.8"/><line x1="17" y1="1" x2="1" y2="17" stroke={th.text} strokeWidth="1.8"/></svg> : <><span style={{ display:'block', width:22, height:1.5, background:th.text }}/><span style={{ display:'block', width:22, height:1.5, background:th.text }}/><span style={{ display:'block', width:22, height:1.5, background:th.text }}/></>}
          </button>
        </div>
      </nav>

      {menuOpen && (
        <div className="nav-mobile-menu" style={{ display:'none', position:'fixed', top:64, left:0, right:0, zIndex:499, background:th.bgNav, backdropFilter:'blur(16px)', borderBottom:`1px solid ${th.border}`, animation:'slideDown 0.25s ease' }}>
          <a href="index.html" style={{ display:'block', width:'100%', borderBottom:`1px solid ${th.border}`, padding:'18px 24px', fontFamily:'Barlow Condensed', fontWeight:900, fontSize:22, letterSpacing:'0.1em', textTransform:'uppercase', color:th.textMuted }}>Start</a>
          <a href="street.html" style={{ display:'block', width:'100%', borderBottom:`1px solid ${th.border}`, padding:'18px 24px', fontFamily:'Barlow Condensed', fontWeight:900, fontSize:22, letterSpacing:'0.1em', textTransform:'uppercase', color:th.textMuted }}>Street</a>
          <a href="travel.html" style={{ display:'block', width:'100%', borderBottom:`1px solid ${th.border}`, padding:'18px 24px', fontFamily:'Barlow Condensed', fontWeight:900, fontSize:22, letterSpacing:'0.1em', textTransform:'uppercase', color:th.text }}>Travel</a>
          <a href="index.html#about" style={{ display:'block', width:'100%', borderBottom:`1px solid ${th.border}`, padding:'18px 24px', fontFamily:'Barlow Condensed', fontWeight:900, fontSize:22, letterSpacing:'0.1em', textTransform:'uppercase', color:th.textMuted }}>About</a>
        </div>
      )}

      <main style={{ flex:1, animation:'slideDown 0.3s ease' }}>
        <div className="intro" style={{ padding:isMobile ? '48px 24px 40px' : '80px 60px 56px', maxWidth:1280, width:'100%', margin:'0 auto' }}>
          <div style={{ fontFamily:'Barlow Condensed', fontWeight:700, fontSize:14, letterSpacing:'0.14em', textTransform:'uppercase', color:th.textMuted, marginBottom:18 }}>Sven Belz — Travel Photography</div>
          <h1 style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:isMobile ? 'clamp(48px, 20vw, 100px)' : 'clamp(64px, 10vw, 160px)', lineHeight:0.92, textTransform:'uppercase', letterSpacing:'-0.03em', color:th.text }}>Travel</h1>
          <p style={{ maxWidth:760, marginTop:24, fontSize:16, lineHeight:1.9, color:th.textMuted }}>Gruppiert nach Reisezielen mit klar editierbarer Datenstruktur. Du kannst später pro Destination eigene Reihen und Bildverhältnisse im <code>DESTINATIONS</code>-Array pflegen, ohne die Layout-Logik anfassen zu müssen.</p>
        </div>

        <div className="destinations" style={{ maxWidth:1280, width:'100%', margin:'0 auto', padding:isMobile ? '0 24px 72px' : '0 60px 100px' }}>
          {DESTINATIONS.map((destination, destinationIndex) => (
            <section key={destination.label} style={{ borderTop: destinationIndex === 0 ? 'none' : `1px solid ${th.border}`, padding: destinationIndex === 0 ? '0 0 40px' : '32px 0 40px' }}>
              <h2 style={{ margin:'0 0 20px', fontFamily:'Barlow Condensed', fontSize:'clamp(28px, 4vw, 48px)', textTransform:'uppercase', letterSpacing:'0.04em', color:th.text }}>{destination.label}</h2>
              {destination.rows.map((row, rowIndex) => (
                <div key={rowIndex} className="row" style={{ display:'flex', gap:14, marginBottom:14 }}>
                  {row.map((image) => {
                    const imageIndex = flatImages.findIndex(item => item.src === image.src && item.destination === destination.label);
                    const flex = image.ratio === 'portrait' ? 1 : image.ratio === 'square' ? 1.2 : 1.7;
                    return (
                      <button key={`${destination.label}-${rowIndex}-${imageIndex}`} className="tile" onClick={() => setLightboxIndex(imageIndex)} style={{ position:'relative', overflow:'hidden', background:th.bgCard, cursor:'pointer', border:'none', padding:0, minWidth:0, flex, width:'100%' }}>
                        <img src={image.src} alt={image.caption || `${destination.label} Bild`} style={{ width:'100%', height:'100%', objectFit:'cover', display:'block', filter:'grayscale(100%)' }} />
                        {image.caption && <div style={{ position:'absolute', left:14, right:14, bottom:14, fontSize:13, letterSpacing:'0.05em', color: dark ? 'rgba(255,255,255,0.88)' : 'rgba(0,0,0,0.72)', textAlign:'left' }}>{image.caption}</div>}
                      </button>
                    );
                  })}
                </div>
              ))}
            </section>
          ))}
        </div>
      </main>

      <footer style={{ borderTop:`1px solid ${th.border}`, padding:'24px', display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:16, transition:'border-color 0.4s' }}>
        <span style={{ fontFamily:'Barlow Condensed', fontWeight:700, fontSize:14, color:th.textSub, letterSpacing:'0.06em', textTransform:'uppercase' }}>&copy; {new Date().getFullYear()} Sven Belz</span>
        <div style={{ display:'flex', gap:32 }}>
          <a href="index.html#impressum" style={{ color:th.textMuted, fontFamily:'Barlow Condensed', fontSize:13, fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase' }}>Impressum</a>
          <a href="index.html#datenschutz" style={{ color:th.textMuted, fontFamily:'Barlow Condensed', fontSize:13, fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase' }}>Privacy Policy</a>
        </div>
      </footer>

      {lightboxIndex !== null && <Lightbox images={flatImages} index={lightboxIndex} onClose={() => setLightboxIndex(null)} onPrev={() => setLightboxIndex(i => (i - 1 + flatImages.length) % flatImages.length)} onNext={() => setLightboxIndex(i => (i + 1) % flatImages.length)} onSelect={setLightboxIndex} th={th} isMobile={isMobile} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
