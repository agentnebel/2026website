name: Bilder konvertieren (AVIF & WebP)

on:
  push:
    paths:
      - "images/**/*.jpg"
      - "images/**/*.jpeg"
      - "images/**/*.JPG"
      - "images/**/*.JPEG"

jobs:
  konvertieren:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Bilder in AVIF & WebP konvertieren
        run: node scripts/konvertiere-bilder.js

      - name: Konvertierte Bilder committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          git diff --staged --quiet || git commit -m "chore: AVIF & WebP Versionen automatisch erstellt"
          git push
