<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seite nicht gefunden | Sven Belz</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(80px, 20vw, 200px);
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 16px;
    }
    p {
      font-size: 18px;
      color: #666;
      margin-bottom: 32px;
      max-width: 400px;
    }
    a {
      display: inline-block;
      padding: 12px 32px;
      border: 1px solid #fff;
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    a:hover {
      background: #fff;
      color: #0a0a0a;
    }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Diese Seite wurde nicht gefunden. Vielleicht ist sie umgezogen oder wurde entfernt.</p>
  <a href="/2026website/">Zurück zur Startseite</a>
</body>
</html>
